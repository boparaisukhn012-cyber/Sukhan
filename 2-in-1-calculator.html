<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>2-in-1 Calculator</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #calculator { display: flex; flex-direction: column; align-items: center; }\n        button { margin: 5px; padding: 10px; }\n        input { margin: 5px; padding: 10px; width: 200px; }\n    </style>\n</head>\n<body>\n    <div id="calculator">\n        <h1>2-in-1 Calculator</h1>\n        <h2>Simple Mode</h2>\n        <input type="text" id="simpleInput" placeholder="Enter calculation (e.g. 2+2)">\n        <button onclick="calculateSimple()">Calculate</button>\n        <p id="simpleResult"></p>\n        <h2>Scientific Mode</h2>\n        <input type="text" id="scientificInput" placeholder="Enter calculation (e.g. sin(45))">\n        <button onclick="calculateScientific()">Calculate</button>\n        <p id="scientificResult"></p>\n    </div>\n    <script>\n        function calculateSimple() {\n            const input = document.getElementById('simpleInput').value;\n            const result = eval(input);\n            document.getElementById('simpleResult').innerText = 'Result: ' + result;\n        }\n        function calculateScientific() {\n            const input = document.getElementById('scientificInput').value;\n            const result = eval(input);\n            document.getElementById('scientificResult').innerText = 'Result: ' + result;\n        }\n    </script>\n</body>\n</html>
